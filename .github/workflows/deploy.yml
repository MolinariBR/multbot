name: Deploy

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches: [main, develop]

permissions:
  contents: read
  issues: write

jobs:
  deploy-staging:
    name: Deploy Staging (develop)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ 'staging' }}
    env:
      VPS_HOST: ${{ secrets['VPS_HOST'] }}
      VPS_USER: ${{ secrets['VPS_USER'] }}
      VPS_SSH_KEY: ${{ secrets['VPS_SSH_KEY'] }}
      VPS_PORT: ${{ secrets['VPS_PORT'] || '22' }}

    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ env.VPS_HOST }}" || (echo "Missing secret: VPS_HOST" && exit 1)
          test -n "${{ env.VPS_USER }}" || (echo "Missing secret: VPS_USER" && exit 1)
          test -n "${{ env.VPS_SSH_KEY }}" || (echo "Missing secret: VPS_SSH_KEY" && exit 1)

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /root/multbot
            git fetch --all --prune
            git checkout develop
            git pull origin develop
            chmod +x ./vps-update.sh
            ./vps-update.sh

      - name: Open issue when deploy fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const buildRunUrl = context.payload.workflow_run?.html_url ?? 'N/A';
            const title = `[CI/CD] Deploy staging falhou (${context.payload.workflow_run?.head_sha?.slice(0, 7) ?? 'unknown'})`;
            const body = [
              '## Falha no Deploy (staging)',
              '',
              '- Branch: `develop`',
              `- SHA: \`${context.payload.workflow_run?.head_sha ?? 'unknown'}\``,
              `- Build upstream: ${buildRunUrl}`,
              `- Run com falha: ${runUrl}`,
              '',
              'Verifique os logs do workflow para detalhes do erro.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'deploy-failure', 'staging'],
            });

  deploy-production:
    name: Deploy Production (main)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ 'production' }}
    env:
      VPS_HOST: ${{ secrets['VPS_HOST'] }}
      VPS_USER: ${{ secrets['VPS_USER'] }}
      VPS_SSH_KEY: ${{ secrets['VPS_SSH_KEY'] }}
      VPS_PORT: ${{ secrets['VPS_PORT'] || '22' }}

    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ env.VPS_HOST }}" || (echo "Missing secret: VPS_HOST" && exit 1)
          test -n "${{ env.VPS_USER }}" || (echo "Missing secret: VPS_USER" && exit 1)
          test -n "${{ env.VPS_SSH_KEY }}" || (echo "Missing secret: VPS_SSH_KEY" && exit 1)

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /root/multbot
            git fetch --all --prune
            git checkout main
            git pull origin main
            chmod +x ./vps-update.sh
            ./vps-update.sh

      - name: Open issue when deploy fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const buildRunUrl = context.payload.workflow_run?.html_url ?? 'N/A';
            const title = `[CI/CD] Deploy production falhou (${context.payload.workflow_run?.head_sha?.slice(0, 7) ?? 'unknown'})`;
            const body = [
              '## Falha no Deploy (production)',
              '',
              '- Branch: `main`',
              `- SHA: \`${context.payload.workflow_run?.head_sha ?? 'unknown'}\``,
              `- Build upstream: ${buildRunUrl}`,
              `- Run com falha: ${runUrl}`,
              '',
              'Verifique os logs do workflow para detalhes do erro.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'deploy-failure', 'production'],
            });
